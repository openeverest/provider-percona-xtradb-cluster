---
# Reusable workflow — run one kuttl integration test suite inside a k3d cluster.
# Called by ci.yaml; not triggered directly.
name: Integration test

on:
  workflow_call:
    inputs:
      make_target:
        description: 'Make target for the kuttl suite (e.g. test-integration-core)'
        type: string
        required: true
      suite:
        description: 'Human-readable suite name used for artifact naming'
        type: string
        required: true

permissions:
  contents: read

env:
  IMG: provider-percona-xtradb-cluster:ci
  # Branch of openeverest/openeverest to build the platform from.
  OPENEVEREST_BRANCH: release-2.0

jobs:
  run:
    name: ${{ inputs.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenEverest (v2)
        uses: actions/checkout@v4
        with:
          repository: openeverest/openeverest
          ref: ${{ env.OPENEVEREST_BRANCH }}
          path: _openeverest

      - name: Install Kubernetes tooling
        uses: ./.github/actions/setup-k8s-tools
        with:
          install-k3d: 'true'
          install-kuttl: 'true'

      - name: Create k3d cluster
        run: |
          sudo modprobe br_netfilter
          make k3d-cluster-up

      - name: Build provider image
        run: make docker-build

      - name: Import image into k3d
        run: make load-image

      - name: Build OpenEverest controller
        working-directory: _openeverest
        run: make build-controller

      - name: Build OpenEverest controller Docker image
        working-directory: _openeverest
        run: make docker-build-controller

      - name: Import OpenEverest controller image into k3d
        run: make load-openeverest-controller-image

      - name: Install CRDs
        run: make install-crds
        env:
          OPENEVEREST_BRANCH: ${{ env.OPENEVEREST_BRANCH }}

      - name: Deploy provider
        run: make deploy-provider-ci

      - name: Deploy OpenEverest controller
        working-directory: _openeverest
        run: make deploy-test-controller

      - name: Wait for OpenEverest deployment to be ready
        working-directory: _openeverest
        run: make wait-test-controller

      - name: Run ${{ inputs.make_target }}
        run: make ${{ inputs.make_target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload kuttl artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kuttl-${{ inputs.suite }}-${{ github.run_id }}
          path: |
            /tmp/kuttl-report*.xml
            /tmp/kuttl-test*
          retention-days: 7
