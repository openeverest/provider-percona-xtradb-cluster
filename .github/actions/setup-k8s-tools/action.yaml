---
name: 'Setup Kubernetes Tools'
description: 'Install k3d, kuttl, and kubectl with checksum verification'

inputs:
  tools-path:
    description: 'Directory to install binaries into'
    required: false
    default: '/opt/tools/bin'

  install-kubectl:
    description: 'Install kubectl (GitHub-hosted runners ship a version; use this for a pinned one)'
    required: false
    default: 'false'
  kubectl-version:
    description: 'kubectl version (without the leading v)'
    required: false
    default: '1.31.0'

  install-kuttl:
    description: 'Install kubectl-kuttl'
    required: false
    default: 'false'
  kuttl-version:
    description: 'kuttl version (without the leading v)'
    required: false
    default: '0.25.0'

  install-k3d:
    description: 'Install k3d'
    required: false
    default: 'false'
  k3d-version:
    description: 'k3d version (without the leading v)'
    required: false
    default: '5.8.3'

runs:
  using: composite
  steps:
    - name: Create tools directory
      shell: bash
      run: |
        mkdir -p "${{ inputs.tools-path }}"
        echo "${{ inputs.tools-path }}" >> "$GITHUB_PATH"

    - name: Install kubectl
      if: inputs.install-kubectl == 'true'
      shell: bash
      run: |
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        VERSION="${{ inputs.kubectl-version }}"
        BASE="https://dl.k8s.io/release/v${VERSION}/bin/linux/${ARCH}"
        DEST="${{ inputs.tools-path }}/kubectl"

        curl -fsSL -o "${DEST}"         "${BASE}/kubectl"
        curl -fsSL -o "${DEST}.sha256"  "${BASE}/kubectl.sha256"
        echo "$(cat "${DEST}.sha256")  ${DEST}" | sha256sum --check --status
        rm "${DEST}.sha256"
        chmod +x "${DEST}"

        echo "kubectl $(kubectl version --client --short 2>/dev/null || kubectl version --client) installed"

    - name: Install kuttl
      if: inputs.install-kuttl == 'true'
      shell: bash
      run: |
        # kuttl uses the raw uname -m naming: x86_64, arm64 (aarch64 → arm64).
        ARCH=$(uname -m | sed 's/aarch64/arm64/')
        VERSION="${{ inputs.kuttl-version }}"
        BASE="https://github.com/kudobuilder/kuttl/releases/download/v${VERSION}"
        BINARY="kubectl-kuttl_${VERSION}_linux_${ARCH}"
        DEST="${{ inputs.tools-path }}/kubectl-kuttl"

        curl -fsSL -o "${DEST}"                           "${BASE}/${BINARY}"
        curl -fsSL -o "/tmp/kuttl_checksums.txt"          "${BASE}/checksums.txt"
        grep "^.\{64\}  ${BINARY}$" /tmp/kuttl_checksums.txt \
          | awk -v dest="${DEST}" '{print $1 "  " dest}' \
          | sha256sum --check --status
        rm /tmp/kuttl_checksums.txt
        chmod +x "${DEST}"

        echo "$(kubectl kuttl --version) installed"

    - name: Install k3d
      if: inputs.install-k3d == 'true'
      shell: bash
      run: |
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        VERSION="${{ inputs.k3d-version }}"
        BASE="https://github.com/k3d-io/k3d/releases/download/v${VERSION}"
        BINARY="k3d-linux-${ARCH}"
        DEST="${{ inputs.tools-path }}/k3d"

        curl -fsSL -o "${DEST}"                   "${BASE}/${BINARY}"
        curl -fsSL -o "/tmp/k3d_sha256sum.txt"    "${BASE}/checksums.txt"
        grep "${BINARY}" /tmp/k3d_sha256sum.txt \
          | awk -v dest="${DEST}" '{print $1 "  " dest}' \
          | sha256sum --check --status
        rm /tmp/k3d_sha256sum.txt
        chmod +x "${DEST}"

        k3d version
