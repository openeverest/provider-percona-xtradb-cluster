# PXC cluster topology definition.
# This file defines both the structural topology and its UI rendering.

config:
  components:
    engine:
      defaults:
        replicas: 3
    haproxy:
      optional: true
      defaults:
        replicas: 2
    proxysql:
      optional: true
    monitoring:
      optional: true

ui:
  sections:
    databaseVersion:
      label: "Database Version"
      description: "Choose the Percona XtraDB Cluster version."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "Database Version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
    resources:
      label: "Resources"
      description: "Configure node count and per-node resources."
      components:
        nodes:
          uiType: number
          path: spec.components.engine.replicas
          fieldParams:
            label: "Number of nodes"
            defaultValue: 3
          validation:
            required: true
            min: 1
            int: true
            celExpressions:
              - celExpr: "spec.components.engine.replicas % 2 == 1"
                message: "The number of nodes must be odd"
        nodesResources:
          uiType: group
          groupType: line
          components:
            cpu:
              path: spec.components.engine.resources.limits.cpu
              uiType: number
              fieldParams:
                label: "CPU"
                defaultValue: 4
                step: 1
              validation:
                min: 0.6
                required: true
            memory:
              path: spec.components.engine.resources.limits.memory
              uiType: number
              fieldParams:
                label: "Memory"
                defaultValue: 8
                step: 0.1
                badge: "Gi"
                badgeToApi: true
              validation:
                min: 0.512
                required: true
            disk:
              path: spec.components.engine.storage.size
              uiType: number
              fieldParams:
                label: "Disk"
                defaultValue: 100
                badge: "Gi"
                badgeToApi: true
              validation:
                min: 1
                int: true
                required: true
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                        message: "Disk size cannot be decreased"
      componentsOrder:
        - nodes
        - nodesResources
    monitoring:
      label: "Monitoring"
      description: "Attach a MonitoringConfig to collect metrics."
      components:
        monitoring:
          uiType: select
          path: spec.components.monitoring.customSpec.monitoringConfigName
          fieldParams:
            label: "Monitoring endpoint"
          dataSource:
            provider: monitoringConfigs
    proxy:
      label: "Proxy"
      description: "Configure a single proxy type for the cluster."
      components:
        haproxyNodes:
          uiType: number
          path: spec.components.haproxy.replicas
          fieldParams:
            label: "HAProxy nodes"
            defaultValue: 2
          validation:
            min: 1
            int: true
            celExpressions:
              - celExpr: "!(has(spec.components.haproxy.replicas) && has(spec.components.proxysql.replicas))"
                message: "HAProxy and ProxySQL are mutually exclusive"
        proxysqlNodes:
          uiType: number
          path: spec.components.proxysql.replicas
          fieldParams:
            label: "ProxySQL nodes"
          validation:
            min: 1
            int: true
            celExpressions:
              - celExpr: "!(has(spec.components.haproxy.replicas) && has(spec.components.proxysql.replicas))"
                message: "HAProxy and ProxySQL are mutually exclusive"
      componentsOrder:
        - haproxyNodes
        - proxysqlNodes
    advanced:
      label: "Advanced configuration"
      description: "Configure advanced PXC settings."
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
          dataSource:
            provider: storageClasses
        configuration:
          uiType: text
          path: spec.components.engine.configuration
          fieldParams:
            label: "Engine configuration"
            # configuration for small clusters as an example. no way to display dynamic config which we actually apply
            placeholder: |2
              [mysqld]
              binlog_cache_size = 131072
              binlog_expire_logs_seconds = 604800
              binlog_format = ROW
              binlog_stmt_cache_size = 131072
              global-connection-memory-limit = 18446744073709551615
              global-connection-memory-tracking = false
              innodb_adaptive_hash_index = True
              innodb_buffer_pool_chunk_size = 2097152
              innodb_buffer_pool_instances = 1
              innodb_buffer_pool_size = 1398838681
              innodb_ddl_threads = 2
              innodb_flush_log_at_trx_commit = 2
              innodb_flush_method = O_DIRECT
              innodb_io_capacity_max = 1800
              innodb_monitor_enable = ALL
              innodb_page_cleaners = 1
              innodb_parallel_read_threads = 1
              innodb_purge_threads = 4
              innodb_redo_log_capacity = 415269664
              join_buffer_size = 524288
              max_connections = 152
              max_heap_table_size = 16777216
              read_rnd_buffer_size = 393216
              replica_compressed_protocol = 1
              replica_exec_mode = STRICT
              replica_parallel_type = LOGICAL_CLOCK
              replica_parallel_workers = 4
              replica_preserve_commit_order = ON
              sort_buffer_size = 524288
              sql_mode = 'ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION,TRADITIONAL,STRICT_ALL_TABLES'
              sync_binlog = 1
              table_definition_cache = 4096
              table_open_cache = 4096
              table_open_cache_instances = 4
              tablespace_definition_cache = 512
              thread_cache_size = 11
              thread_pool_size = 4
              thread_stack = 1048576
              tmp_table_size = 16777216
              wsrep_slave_threads = 1
              wsrep_sync_wait = 3
              wsrep_trx_fragment_size = 1048576
              wsrep_trx_fragment_unit = bytes
              wsrep-provider-options = evs.delayed_keep_period=PT545S;evs.inactive_timeout=PT90S;gmcast.peer_timeout=PT11S;gmcast.time_wait=PT13S;pc.linger=PT45S;evs.delay_margin=PT22S;evs.suspect_timeout=PT45S;gcs.fc_limit=96;gcs.max_packet_size=98304;evs.send_window=768;evs.user_send_window=768;evs.join_retrans_period=PT3S;evs.inactive_check_period=PT3S;evs.stats_report_period=PT1M;evs.max_install_timeouts=3;pc.announce_timeout=PT45S;pc.recovery=true;gcache.size=477560113;gcache.recover=yes;
            multiline: true
            minRows: 3
            maxRows: 8
      componentsOrder:
        - storageClass
        - configuration
  sectionsOrder:
    - databaseVersion
    - resources
    - monitoring
    - proxy
    - advanced

