# PXC cluster topology definition.
# This file defines both the structural topology and its UI rendering.

config:
  components:
    engine:
      defaults:
        replicas: 3
    monitoring:
      optional: true

ui:
  sections:
    databaseVersion:
      label: "Database Version"
      description: "Choose the Percona XtraDB Cluster version."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "Database Version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
    resources:
      label: "Resources"
      description: "Configure node count and per-node resources."
      components:
        nodes:
          uiType: number
          path: spec.components.engine.replicas
          fieldParams:
            label: "Number of nodes"
            defaultValue: 3
          validation:
            required: true
            min: 1
            int: true
            celExpressions:
              - celExpr: "spec.components.engine.replicas % 2 == 1"
                message: "The number of nodes must be odd"
        nodesResources:
          uiType: group
          groupType: line
          components:
            cpu:
              path: spec.components.engine.resources.limits.cpu
              uiType: number
              fieldParams:
                label: "CPU"
                defaultValue: 1
                step: 1
              validation:
                min: 0.6
                required: true
            memory:
              path: spec.components.engine.resources.limits.memory
              uiType: number
              fieldParams:
                label: "Memory"
                defaultValue: 2
                step: 0.1
                badge: "Gi"
                badgeToApi: true
              validation:
                min: 0.512
                required: true
            disk:
              path: spec.components.engine.storage.size
              uiType: number
              fieldParams:
                label: "Disk"
                defaultValue: 8
                badge: "Gi"
                badgeToApi: true
              validation:
                min: 1
                int: true
                required: true
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                        message: "Disk size cannot be decreased"
      componentsOrder:
        - nodes
        - nodesResources
    monitoring:
      label: "Monitoring"
      description: "Attach a MonitoringConfig to collect metrics."
      components:
        monitoring:
          uiType: select
          path: spec.components.monitoring.customSpec.monitoringConfigName
          fieldParams:
            label: "Monitoring endpoint"
          dataSource:
            provider: monitoringConfigs
    advanced:
      label: "Advanced configuration"
      description: "Configure advanced PXC settings."
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
          dataSource:
            provider: storageClasses
        configuration:
          uiType: text
          path: spec.components.engine.configuration
          fieldParams:
            label: "Engine configuration"
            placeholder: |2
              [mysqld]
              wsrep_provider_options="gcache.size=1G"
            multiline: true
            minRows: 3
            maxRows: 8
      componentsOrder:
        - storageClass
        - configuration
  sectionsOrder:
    - databaseVersion
    - resources
    - monitoring
    - advanced

