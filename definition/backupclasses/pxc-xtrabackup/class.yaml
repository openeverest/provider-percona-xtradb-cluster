# PXC XtraBackup BackupClass definition.
# This file is the source of truth for the generated BackupClass manifest.
displayName: PXC XtraBackup
description: Provider-managed Percona XtraBackup for Percona XtraDB Cluster.
supportedProviders:
  - percona-xtradb-cluster
executionMode: ProviderManaged
providerManaged:
  supportsPITR: true
  limits:
    maxPITREnabledStorages: 1
  pitrConfigSchema: PXCXtraBackupPITRConfig
config:
  openAPIV3Schema: PXCXtraBackupBackupConfig
restoreConfig:
  openAPIV3Schema: PXCXtraBackupRestoreConfig

